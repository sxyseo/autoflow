# Configuration to prevent pytest process leaks in Autoflow
# Add this to your development environment setup

# Prevent pytest-xdist from creating too many workers
export PYTEST_XDIST_AUTO_NUM_WORKERS=2

# Limit pytest parallel execution
export PYTEST_WORKER_COUNT=2

# Set pytest timeout to prevent hanging tests
export PYTEST_TIMEOUT=300

# Enable pytest to clean up after itself
export PYTEST_ADDOPTS="-p no:xdist"

# Alternative: Use pytest-xdist with limited workers
# export PYTEST_ADDOPTS="-n 2"

# Limit the number of concurrent processes in general
export ULIMIT_MAX_PROCESSES=500

# Set memory limits for Python processes
export PYTHONMALLOC=malloc
export MALLOC_ARENA_MAX=2

# Enable Python garbage collection tuning
export PYTHONHASHSEED=0
export PYTHONOPTIMIZE=1

# Disable unnecessary Python features for testing
export PYTHONDONTWRITEBYTECODE=1
export PYTHONUNBUFFERED=1

# Instructions:
# 1. Source this file in your shell startup script (.zshrc or .bashrc):
#    source /Users/abel/dev/autoflow/config/pytest_prevention.conf
#
# 2. Or add to your project's pytest.ini:
#    [pytest]
#    addopts = -n 2 --timeout=300
#
# 3. Add to pyproject.toml:
#    [tool.pytest.ini_options]
#    addopts = "-n 2 --timeout=300"
