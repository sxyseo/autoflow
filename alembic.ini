# Alembic Configuration for Autoflow
#
# This file controls the database migration system for Autoflow.
# Migrations are stored in alembic/versions/ directory.
#
# Usage:
#   alembic revision -m "description"  # Create a new migration
#   alembic upgrade head               # Apply all migrations
#   alembic downgrade -1               # Rollback one migration
#   alembic history                    # Show migration history

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for migration timestamps
timezone = UTC

# Truncate long revision descriptions
truncate_slug_length = 40

# Revision numbering scheme (integer or hex)
# integer: Uses sequential integers (1, 2, 3, ...)
# hex: Uses hexadecimal hashes (like git)
rev_id = hex

# Version path separator (used for customizing revision paths)
version_path_separator = os

# Output encoding for generated migration scripts
output_encoding = utf-8

# Database connection URL
# IMPORTANT: Set via environment variable AUTOFLOW_DATABASE_URL
# Falls back to SQLite for local development
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# Hooks to run after generating a migration file
# Format: <hook_name>=<command>

# Format code with ruff after generating migration
# hooks = ruff
# ruff.type = console_scripts
# ruff.entrypoint = ruff
# ruff.options = format alembic/versions/

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
